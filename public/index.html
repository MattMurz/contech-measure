<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ConTech Measure Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header>
      <h1>ConTech Measure Demo</h1>
      <p class="muted">Wgraj zdjęcie z kartką A4. System wykryje narożniki i zrobi warp.</p>
    </header>

    <section class="controls">
      <input id="file" type="file" accept="image/*" />
      <button id="autoDetectBtn">Auto detect and measure</button>
      <div id="result"></div>
    </section>

    <section class="canvases">
      <div class="canvas-wrap">
        <h3>Original</h3>
        <canvas id="inputCanvas"></canvas>
      </div>
      <div class="canvas-wrap">
        <h3>Warped A4</h3>
        <canvas id="warpedCanvas" width="840" height="1188"></canvas>
      </div>
    </section>

    <footer>
      <small>Prywatne przetwarzanie w przeglądarce</small>
    </footer>
  </main>

  <script src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script src="https://unpkg.com/konva@8/konva.min.js"></script>
  <script src="../src/cv/detectA4.js"></script>
  <script src="../src/cv/warp.js"></script>
  <script src="../src/ui/konvaLayer.js"></script>
  <script src="app.js"></script>
</body>
</html>
